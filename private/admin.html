<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel â€” ArgueOut</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script>(function(){var t=localStorage.getItem('ao-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');}());</script>
  <style>
    .admin-layout { min-height:100dvh; display:flex; flex-direction:column; }
    .admin-nav { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:60px; border-bottom:1px solid var(--border); background:var(--bg-1); flex-shrink:0; }
    .admin-nav-brand { display:flex; align-items:center; gap:10px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1rem; color:var(--text-1); }
    .admin-badge { background:var(--red); color:#fff; font-size:0.62rem; font-weight:700; padding:2px 7px; border-radius:99px; letter-spacing:0.06em; text-transform:uppercase; }
    .admin-body { flex:1; max-width:1100px; margin:0 auto; width:100%; padding:28px 20px; }
    .admin-tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--bg-1); border:1px solid var(--border); border-radius:var(--r-md); padding:4px; width:fit-content; }
    .admin-tab { padding:8px 20px; border:none; background:none; color:var(--text-2); font-size:0.88rem; font-weight:600; border-radius:var(--r-sm); cursor:pointer; transition:background 150ms,color 150ms; }
    .admin-tab.active { background:var(--purple); color:#fff; }
    .admin-tab:hover:not(.active) { background:rgba(139,92,246,0.1); color:var(--text-1); }
    .admin-pane { display:none; }
    .admin-pane.active { display:block; }
    .admin-card { background:var(--bg-1); border:1px solid var(--border); border-radius:var(--r-lg); padding:20px 24px; margin-bottom:16px; }
    .report-item { background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r-md); padding:14px 16px; margin-bottom:10px; }
    .report-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
    .report-parties { font-size:0.88rem; color:var(--text-1); font-weight:600; }
    .report-meta { font-size:0.75rem; color:var(--text-3); }
    .report-reason { font-size:0.85rem; color:var(--text-2); background:rgba(255,255,255,0.03); border-radius:6px; padding:8px 10px; margin-bottom:10px; font-style:italic; border-left:3px solid rgba(139,92,246,0.4); }
    .report-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .report-loc { font-size:0.7rem; padding:2px 8px; border-radius:99px; background:rgba(255,255,255,0.06); color:var(--text-3); border:1px solid var(--border); }
    .report-dismissed { opacity:0.45; }
    .dur-select { background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--text-1); padding:6px 10px; font-size:0.8rem; outline:none; cursor:pointer; }
    .user-row { background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r-md); padding:12px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .user-row-info { flex:1; min-width:0; }
    .user-row-name { font-size:0.9rem; font-weight:600; }
    .user-row-sub { font-size:0.75rem; color:var(--text-3); margin-top:2px; }
    .user-row-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .ban-chip { background:rgba(239,68,68,0.12); color:var(--red); border:1px solid rgba(239,68,68,0.25); font-size:0.7rem; padding:2px 8px; border-radius:99px; white-space:nowrap; }
    .search-row { display:flex; gap:10px; margin-bottom:16px; }
    .search-row input { flex:1; }
    .notif-form { display:flex; flex-direction:column; gap:12px; max-width:560px; }
    .notif-form textarea { min-height:100px; resize:vertical; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r-md); color:var(--text-1); font-size:0.9rem; padding:12px 14px; font-family:inherit; outline:none; }
    .notif-form textarea:focus { border-color:var(--purple); }
    .filter-row { display:flex; gap:8px; margin-bottom:16px; }
    .filter-btn { padding:5px 14px; border:1px solid var(--border); background:none; color:var(--text-2); font-size:0.8rem; border-radius:99px; cursor:pointer; transition:all 150ms; }
    .filter-btn.active { background:var(--purple); color:#fff; border-color:var(--purple); }
    .admin-empty { text-align:center; padding:40px 20px; color:var(--text-3); font-size:0.9rem; }
    .stat-row { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
    .stat-card { background:var(--bg-1); border:1px solid var(--border); border-radius:var(--r-md); padding:16px 20px; flex:1; min-width:140px; }
    .stat-label { font-size:0.72rem; color:var(--text-3); text-transform:uppercase; letter-spacing:0.07em; font-weight:600; font-family:'Space Grotesk',sans-serif; }
    .stat-val { font-size:1.6rem; font-weight:800; font-family:'Space Grotesk',sans-serif; }
  </style>
</head>
<body>
<div class="admin-layout">

  <nav class="admin-nav">
    <div class="admin-nav-brand">
      <a href="/" class="nav-logo"><img src="/logo.png" alt="ArgueOut" class="nav-logo-img"></a>
      Admin Panel
      <span class="admin-badge">Admin</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="adminUsername" style="font-size:0.85rem;color:var(--text-3)"></span>
      <a href="/lobby" class="btn btn-ghost btn-sm">â† Back to Lobby</a>
    </div>
  </nav>

  <div class="admin-body">

    <!-- Stats row -->
    <div class="stat-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">Pending Reports</div>
        <div class="stat-val gradient-text" id="statPending">â€”</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Reports</div>
        <div class="stat-val gradient-text" id="statTotal">â€”</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('reports')">Reports</button>
      <button class="admin-tab" onclick="switchTab('users')">Users</button>
      <button class="admin-tab" onclick="switchTab('notify')">Notify</button>
    </div>

    <!-- Reports tab -->
    <div class="admin-pane active" id="pane-reports">
      <div class="filter-row">
        <button class="filter-btn active" id="filt-pending" onclick="loadReports('pending')">Pending</button>
        <button class="filter-btn" id="filt-all" onclick="loadReports('all')">All</button>
        <button class="btn btn-ghost btn-sm" onclick="loadReports(currentFilter)" style="margin-left:auto">â†» Refresh</button>
      </div>
      <div id="reportsList"><div class="admin-empty">Loading reportsâ€¦</div></div>
    </div>

    <!-- Users tab -->
    <div class="admin-pane" id="pane-users">
      <div class="search-row">
        <input class="form-input" id="userSearchInput" type="text" placeholder="Search by usernameâ€¦" autocomplete="off" />
        <button class="btn btn-primary btn-sm" onclick="searchUsers()">Search</button>
      </div>
      <div id="usersList"><div class="admin-empty">Search for a user above</div></div>
    </div>

    <!-- Notify tab -->
    <div class="admin-pane" id="pane-notify">
      <div class="admin-card">
        <div style="font-size:0.95rem;font-weight:700;margin-bottom:16px">Send Notification</div>
        <div class="notif-form">
          <div>
            <label class="form-label" for="notifTo">Recipient username</label>
            <div style="display:flex;gap:8px">
              <input class="form-input" id="notifTo" type="text" placeholder="username" autocomplete="off" />
              <button class="btn btn-ghost btn-sm" onclick="resolveNotifUser()" style="flex-shrink:0">Look up</button>
            </div>
            <div id="notifResolveStatus" style="font-size:0.78rem;margin-top:6px;color:var(--text-3)"></div>
          </div>
          <div>
            <label class="form-label" for="notifMsg">Message</label>
            <textarea class="form-input" id="notifMsg" placeholder="Write your messageâ€¦" maxlength="500"></textarea>
            <div style="font-size:0.72rem;color:var(--text-3);margin-top:4px;text-align:right"><span id="notifMsgCount">0</span>/500</div>
          </div>
          <div>
            <button class="btn btn-primary" id="sendNotifBtn" onclick="sendNotification()">Send Notification</button>
            <div id="notifSendStatus" style="font-size:0.82rem;margin-top:8px"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-init.js"></script>
<script src="/js/theme.js"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="/js/admin.js"></script>

<!-- Admin report modal -->
<div id="adminReportModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px">
  <div class="admin-card" style="max-width:400px;width:100%;border-radius:var(--r-lg);background:var(--bg-1)">
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;margin-bottom:4px">File Report</div>
    <div style="font-size:0.85rem;color:var(--text-2);margin-bottom:16px">Reporting: <span id="adminReportTarget" style="color:var(--text-1);font-weight:600"></span></div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      <label class="report-reason-opt"><input type="radio" name="admin-reason" value="Harassment"> Harassment</label>
      <label class="report-reason-opt"><input type="radio" name="admin-reason" value="Hate speech"> Hate speech</label>
      <label class="report-reason-opt"><input type="radio" name="admin-reason" value="Threats"> Threats</label>
      <label class="report-reason-opt"><input type="radio" name="admin-reason" value="Spam"> Spam</label>
      <label class="report-reason-opt"><input type="radio" name="admin-reason" value="Inappropriate content"> Inappropriate content</label>
      <label class="report-reason-opt"><input type="radio" name="admin-reason" value="Other"> Other...</label>
    </div>
    <div id="adminReportOtherWrap" style="display:none;margin-bottom:12px">
      <input id="adminReportOther" class="input" placeholder="Describe the reason..." style="width:100%">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="closeAdminReport()">Cancel</button>
      <button class="btn btn-sm" style="background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25)" onclick="submitAdminReport()">Submit Report</button>
    </div>
  </div>
</div></body>
</html>
