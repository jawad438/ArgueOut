<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Restricted &mdash; ArgueOut</title>
  <script>(function(){var t=localStorage.getItem('ao-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');document.documentElement.style.background=(t==='light'||(t!=='dark'&&window.matchMedia('(prefers-color-scheme: light)').matches))?'#e5e5f2':'#05050f';if(typeof window.AndroidAuth!=='undefined'||window.matchMedia('(max-width:1024px)').matches)document.write('<style>@view-transition{navigation:none}</style>');}());</script>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script src="/js/page-transitions.js" defer></script>
</head>
<body>
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div><div class="bg-orb bg-orb-4"></div>
  <div class="bg-orb bg-orb-5"></div>
</div>

<div class="page-center">
  <div class="auth-card" style="text-align:center;padding:56px 32px;max-width:460px">
    <div id="banIcon" style="width:56px;height:56px;margin:0 auto 16px;color:var(--red)"><svg style="width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></div>
    <h1 id="banTitle" style="font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:10px">Account Restricted</h1>
    <p id="banDesc" style="color:var(--text-2);line-height:1.7;margin-bottom:24px">Checking your account status&hellip;</p>
    <div id="countdown" style="display:none;font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;color:var(--purple);letter-spacing:0.04em;margin-bottom:24px"></div>

    <div id="appealSection" style="display:none;text-align:left;margin-bottom:20px">
      <label class="form-label" for="appealMsg" style="display:block;margin-bottom:6px">Think this is a mistake? Appeal it</label>
      <textarea id="appealMsg" class="form-input" maxlength="200" placeholder="Briefly explain why (5–200 characters)" style="min-height:80px;resize:vertical;width:100%"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <span id="appealCount" style="font-size:0.72rem;color:var(--text-3)">0/200</span>
        <button class="btn btn-primary btn-sm" id="appealSubmitBtn" onclick="submitAppeal()">Send Appeal</button>
      </div>
      <div id="appealStatus" style="font-size:0.8rem;margin-top:8px;min-height:18px"></div>
    </div>
    <div id="appealSentMsg" style="display:none;margin-bottom:20px;padding:10px 14px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:10px;color:var(--green);font-size:0.85rem">
      Your appeal has been sent and is pending review.
    </div>

    <button class="btn btn-ghost" onclick="handleSignOut()">Sign out</button>
  </div>
</div>

<script src="/js/bg.js"></script>
<script src="/js/theme.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-init.js"></script>
<script>
// auth and firestoreDb are declared by firebase-init.js — do not redeclare them

let countdownInterval = null;
let unsubSnapshot = null;

function formatMs(ms) {
  if (ms <= 0) return '00:00:00';
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = s % 60;
  return [h, m, ss].map(n => String(n).padStart(2, '0')).join(':');
}

function startCountdown(until) {
  if (countdownInterval) return;
  const cd = document.getElementById('countdown');
  cd.style.display = 'block';
  function tick() {
    const left = until - Date.now();
    if (left <= 0) {
      cd.textContent = '00:00:00';
      clearInterval(countdownInterval);
      countdownInterval = null;
      setTimeout(() => { window.location.href = '/lobby'; }, 1500);
      return;
    }
    cd.textContent = formatMs(left);
  }
  tick();
  countdownInterval = setInterval(tick, 1000);
}

function handleSignOut() {
  if (unsubSnapshot) unsubSnapshot();
  if (countdownInterval) clearInterval(countdownInterval);
  auth.signOut().then(() => { window.location.href = '/login'; });
}

let _appealStatusChecked = false;

async function checkAppealStatus() {
  if (_appealStatusChecked) return;
  _appealStatusChecked = true;
  try {
    const token = await auth.currentUser.getIdToken();
    const res = await fetch('/api/appeal/status', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    if (data.pending) {
      document.getElementById('appealSection').style.display = 'none';
      document.getElementById('appealSentMsg').style.display = 'block';
    } else {
      document.getElementById('appealSection').style.display = 'block';
    }
  } catch {
    document.getElementById('appealSection').style.display = 'block';
  }
}

async function submitAppeal() {
  const textarea = document.getElementById('appealMsg');
  const statusEl = document.getElementById('appealStatus');
  const btn      = document.getElementById('appealSubmitBtn');
  const msg = textarea.value.trim();
  if (msg.length < 5 || msg.length > 200) {
    statusEl.textContent = 'Message must be 5–200 characters.';
    statusEl.style.color = 'var(--red)';
    return;
  }
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const token = await auth.currentUser.getIdToken();
    const res = await fetch('/api/appeal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to send appeal.');
    document.getElementById('appealSection').style.display = 'none';
    document.getElementById('appealSentMsg').style.display = 'block';
  } catch (err) {
    statusEl.textContent = err.message || 'Failed to send appeal. Try again.';
    statusEl.style.color = 'var(--red)';
  } finally {
    btn.disabled = false; btn.textContent = 'Send Appeal';
  }
}

document.getElementById('appealMsg')?.addEventListener('input', e => {
  document.getElementById('appealCount').textContent = e.target.value.length + '/200';
});

function applyBanData(data) {
  if (!data.banned) {
    window.location.href = '/lobby';
    return;
  }

  const until = data.bannedUntil ? data.bannedUntil.toDate() : null;

  if (until && until <= new Date()) {
    window.location.href = '/lobby';
    return;
  }

  const titleEl = document.getElementById('banTitle');
  const descEl  = document.getElementById('banDesc');
  const iconEl  = document.getElementById('banIcon');

  if (until) {
    iconEl.style.color = 'var(--amber)';
    iconEl.innerHTML   = '<svg style="width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
    titleEl.textContent = 'You\'ve been timed out';
    descEl.textContent  = 'Your account has been temporarily suspended. You\'ll be able to rejoin when the timer reaches zero.';
    startCountdown(until.getTime());
  } else {
    iconEl.style.color = 'var(--red)';
    iconEl.innerHTML   = '<svg style="width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>';
    titleEl.textContent = 'You\'ve been banned';
    descEl.textContent  = 'Your account has been permanently removed from ArgueOut due to a violation of our community guidelines.';
  }
  checkAppealStatus();
}

auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = '/login'; return; }

  unsubSnapshot = firestoreDb.collection('users').doc(user.uid).onSnapshot(
    doc => {
      if (!doc.exists) { window.location.href = '/login'; return; }
      applyBanData(doc.data());
    },
    () => {
      document.getElementById('banDesc').textContent = 'Unable to load account status. Please try again.';
    }
  );
});
</script>
<script src="/js/legal-footer.js"></script>
<script src="/js/debug-overlay.js"></script>
</body>
</html>
