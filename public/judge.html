<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bench — ArgueOut</title>
  <script>(function(){var t=localStorage.getItem('ao-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');document.documentElement.style.background=(t==='light'||(t!=='dark'&&window.matchMedia('(prefers-color-scheme: light)').matches))?'#e5e5f2':'#05050f';if(typeof window.AndroidAuth!=='undefined'||window.matchMedia('(max-width:1024px)').matches)document.write('<style>@view-transition{navigation:none}</style>');}());</script>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script src="/js/page-transitions.js" defer></script>
  <script src="/js/instant-nav.js" defer></script>
  <script src="/js/cookie-consent.js" defer></script>
  <style>
    body { background: var(--bg-0); min-height: 100dvh; }
    .bench-page { max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }
    .bench-topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .bench-back {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      border: 1px solid var(--border); background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-1); text-decoration: none; font-size: 1.2rem;
    }
    .bench-title { font-size: 1.3rem; font-weight: 800; font-family: 'Space Grotesk', sans-serif; }
    .bench-question { font-size: 0.85rem; color: var(--text-3); margin-top: 2px; }
    .bench-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 720px) { .bench-columns { grid-template-columns: 1fr; } }
    .bench-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
    .bench-name { font-size: 1.05rem; font-weight: 800; margin-bottom: 2px; }
    .bench-avg { font-size: 0.85rem; color: var(--purple); font-weight: 700; margin-bottom: 18px; }
    .bench-cat { margin-bottom: 18px; }
    .bench-cat:last-child { margin-bottom: 0; }
    .bench-cat-label { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: var(--text-1); }
    .bench-cat-weight { color: var(--text-3); font-weight: 500; }
    .bench-cat-desc { font-size: 0.72rem; color: var(--text-3); margin-bottom: 8px; }
    .bench-slider { width: 100%; accent-color: var(--purple); }
    .bench-slider-value { text-align: right; font-size: 0.8rem; font-weight: 700; color: var(--text-2); margin-top: 2px; }
    .bench-submit-wrap { margin-top: 26px; text-align: center; }
    #loadingState, #errorState, #doneState { padding: 60px 20px; text-align: center; color: var(--text-3); }
  </style>
</head>
<body>
<div class="bench-page">
  <div class="bench-topbar">
    <a href="/debates" class="bench-back">←</a>
    <div>
      <div class="bench-title" style="display:flex;align-items:center;gap:8px"><svg style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M5 7h14"/><path d="M5 7l-3.5 7a3.5 3.5 0 0 0 7 0Z"/><path d="M19 7l-3.5 7a3.5 3.5 0 0 0 7 0Z"/><path d="M7 21h10"/></svg> The Bench</div>
      <div class="bench-question" id="benchQuestion">Loading debate…</div>
    </div>
  </div>

  <div id="loadingState">Loading debate…</div>

  <div id="errorState" style="display:none">
    <p id="errorText" style="margin-bottom: 20px">This debate isn't available to judge.</p>
    <a href="/debates" class="btn btn-primary">Browse Live Debates</a>
  </div>

  <div id="benchForm" style="display:none">
    <div class="bench-columns">
      <div class="bench-card" id="benchCardA">
        <div class="bench-name" id="benchNameA"></div>
        <div class="bench-avg" id="benchAvgA">Weighted average: —</div>
        <div id="benchCatsA"></div>
      </div>
      <div class="bench-card" id="benchCardB">
        <div class="bench-name" id="benchNameB"></div>
        <div class="bench-avg" id="benchAvgB">Weighted average: —</div>
        <div id="benchCatsB"></div>
      </div>
    </div>
    <div class="bench-submit-wrap">
      <button class="btn btn-primary btn-lg" id="submitScoresBtn" onclick="submitScores()">Submit Verdict</button>
    </div>
  </div>

  <div id="doneState" style="display:none">
    <div style="font-size:2.4rem;margin-bottom:12px">✅</div>
    <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;color:var(--text-1)">Verdict submitted!</div>
    <p style="margin-bottom:20px">Thanks for judging — both debaters have been notified.</p>
    <a href="/debates" class="btn btn-primary">Browse Live Debates</a>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-init.js"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="/js/judge.js"></script>
<script src="/js/legal-footer.js"></script>
</body>
</html>
