<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied — ArgueOut</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script>(function(){var t=localStorage.getItem('ao-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');if(typeof window.AndroidAuth!=='undefined'||window.matchMedia('(max-width:1024px)').matches)document.write('<style>@view-transition{navigation:none}</style>');}());</script>
  <script src="/js/page-transitions.js" defer></script>
</head>
<body>
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div><div class="bg-orb bg-orb-4"></div>
  <div class="bg-orb bg-orb-5"></div>
</div>
<div class="page-center">
  <div class="auth-card" style="text-align:center;padding:56px 32px;max-width:460px">
    <div style="font-size:3.5rem;margin-bottom:16px;line-height:1">&#x1F512;</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:10px">Access Denied</h1>
    <p style="color:var(--text-2);line-height:1.7">Your network has been blocked from accessing ArgueOut due to a violation of our terms of service.</p>
  </div>
</div>
<script src="/js/bg.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/legal-footer.js"></script>
</body>
</html>
