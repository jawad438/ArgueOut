<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied — ArgueOut</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script>(function(){var t=localStorage.getItem('ao-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');document.documentElement.style.background=(t==='light'||(t!=='dark'&&window.matchMedia('(prefers-color-scheme: light)').matches))?'#e5e5f2':'#05050f';if(typeof window.AndroidAuth!=='undefined'||window.matchMedia('(max-width:1024px)').matches)document.write('<style>@view-transition{navigation:none}</style>');}());</script>
  <script src="/js/page-transitions.js" defer></script>
</head>
<body>
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div><div class="bg-orb bg-orb-4"></div>
  <div class="bg-orb bg-orb-5"></div>
</div>
<div class="page-center">
  <div class="auth-card" style="text-align:center;padding:56px 32px;max-width:460px">
    <div style="width:56px;height:56px;margin:0 auto 16px;color:var(--red)"><svg style="width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.5" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:10px">Access Denied</h1>
    <p style="color:var(--text-2);line-height:1.7;margin-bottom:20px">Your network has been blocked from accessing ArgueOut due to a violation of our terms of service.</p>

    <div id="appealSection" style="display:none;text-align:left">
      <label class="form-label" for="appealMsg" style="display:block;margin-bottom:6px">Think this is a mistake? Appeal it</label>
      <textarea id="appealMsg" class="form-input" maxlength="200" placeholder="Briefly explain why (5–200 characters)" style="min-height:80px;resize:vertical;width:100%"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <span id="appealCount" style="font-size:0.72rem;color:var(--text-3)">0/200</span>
        <button class="btn btn-primary btn-sm" id="appealSubmitBtn" onclick="submitAppeal()">Send Appeal</button>
      </div>
      <div id="appealStatus" style="font-size:0.8rem;margin-top:8px;min-height:18px"></div>
    </div>
    <div id="appealSentMsg" style="display:none;text-align:left;padding:10px 14px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:10px;color:var(--green);font-size:0.85rem">
      Your appeal has been sent and is pending review.
    </div>
  </div>
</div>
<script src="/js/bg.js"></script>
<script src="/js/theme.js"></script>
<script>
(async function checkAppealStatus() {
  try {
    const res = await fetch('/api/appeal-ip/status');
    const data = await res.json();
    document.getElementById(data.pending ? 'appealSentMsg' : 'appealSection').style.display = 'block';
  } catch {
    document.getElementById('appealSection').style.display = 'block';
  }
})();

document.getElementById('appealMsg')?.addEventListener('input', e => {
  document.getElementById('appealCount').textContent = e.target.value.length + '/200';
});

async function submitAppeal() {
  const textarea = document.getElementById('appealMsg');
  const statusEl = document.getElementById('appealStatus');
  const btn      = document.getElementById('appealSubmitBtn');
  const msg = textarea.value.trim();
  if (msg.length < 5 || msg.length > 200) {
    statusEl.textContent = 'Message must be 5–200 characters.';
    statusEl.style.color = 'var(--red)';
    return;
  }
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const res = await fetch('/api/appeal-ip', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to send appeal.');
    document.getElementById('appealSection').style.display = 'none';
    document.getElementById('appealSentMsg').style.display = 'block';
  } catch (err) {
    statusEl.textContent = err.message || 'Failed to send appeal. Try again.';
    statusEl.style.color = 'var(--red)';
  } finally {
    btn.disabled = false; btn.textContent = 'Send Appeal';
  }
}
</script>
<script src="/js/legal-footer.js"></script>
</body>
</html>
