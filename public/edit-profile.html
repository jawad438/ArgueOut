<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile — ArgueOut</title>
  <script>(function(){var t=localStorage.getItem('ao-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');document.documentElement.style.background=(t==='light'||(t!=='dark'&&window.matchMedia('(prefers-color-scheme: light)').matches))?'#e5e5f2':'#05050f';if(typeof window.AndroidAuth!=='undefined'||window.matchMedia('(max-width:1024px)').matches)document.write('<style>@view-transition{navigation:none}</style>');}());</script>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script src="/js/page-transitions.js" defer></script>
  <script src="/js/instant-nav.js" defer></script>
  <script src="/js/cookie-consent.js" defer></script>
  <style>
    body { background: var(--bg-0); min-height: 100dvh; }
    .ep-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }
    .ep-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; margin: 0 -16px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--navbar-bg);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }
    .ep-back {
      width: 40px; height: 40px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-1); text-decoration: none; flex-shrink: 0;
    }
    .ep-topbar-title { font-size: 1.05rem; font-weight: 700; color: var(--text-1); }

    /* Compact account-switcher trigger bar */
    .ep-acct-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 14px; margin-bottom: 16px;
      cursor: pointer;
    }
    .ep-acct-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--grad-brand);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.85rem;
      color: #fff; flex-shrink: 0; overflow: hidden;
    }
    .ep-acct-label { flex: 1; font-size: 0.85rem; color: var(--text-2); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ep-acct-label b { color: var(--text-1); }
  </style>
</head>
<body>
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="ep-page">
  <div class="ep-topbar">
    <a href="/settings" class="ep-back" aria-label="Back">

    </a>

    <div class="ep-acct-avatar" id="epAcctAvatar">?</div>
    <div class="ep-acct-label">Signed in as <b id="epAcctUsername">…</b></div>

        Change

<!-- Account switch / add modal -->

      Continue with Google

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script src="/js/firebase-init.js"></script>
<script src="/js/push-notifications.js"></script>
<script src="/js/countries.js"></script>
<script src="/js/account-switcher.js"></script>
<script>
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function showToast(message, type) {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const icons  = {
    success: '<svg style="width:13px;height:13px;vertical-align:-2px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg style="width:13px;height:13px;vertical-align:-2px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    info:    '<svg style="width:13px;height:13px;vertical-align:-2px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  const colors = { success: 'var(--green)', error: 'var(--red)', info: 'var(--purple)' };
  const toast  = document.createElement('div');
  toast.className = `toast ${type || 'info'}`;
  toast.innerHTML = `<span class="toast-icon" style="color:${colors[type] || colors.info}">${icons[type] || icons.info}</span> ${message}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function compressAvatar(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const SIZE   = 96;
      const canvas = document.createElement('canvas');
      canvas.width = SIZE; canvas.height = SIZE;
      const ctx    = canvas.getContext('2d');
      const s      = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, SIZE, SIZE);
      resolve(canvas.toDataURL('image/jpeg', 0.72));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function applyAvatar(avatarUrl, initial) {
  const profAvatar = document.getElementById('profileAvatar');
  const acctAvatar = document.getElementById('epAcctAvatar');
  const imgHtml = `<img src="${avatarUrl}" alt="Avatar" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
  if (avatarUrl) {
    if (profAvatar) profAvatar.innerHTML = imgHtml;
    if (acctAvatar) acctAvatar.innerHTML = imgHtml;
  } else {
    if (profAvatar) profAvatar.textContent = initial;
    if (acctAvatar) acctAvatar.textContent = initial;
  }
}

let _profile = null;

firebase.auth().onAuthStateChanged(async user => {
  if (!user) { window.location.href = '/login'; return; }

  const doc = await firestoreDb.collection('users').doc(user.uid).get();
  if (!doc.exists) { window.location.href = '/login'; return; }
  _profile = doc.data();
  const initial = (_profile.username || 'U')[0].toUpperCase();

  ['width','height','display','border-radius'].forEach(p => document.getElementById('profileAvatar').style.removeProperty(p));
  document.getElementById('profileAvatar').classList.remove('skel');
  applyAvatar(_profile.avatarUrl || '', initial);

  const nameEl = document.getElementById('profileName');
  nameEl.classList.remove('skel');
  ['width','height','border-radius'].forEach(p => nameEl.style.removeProperty(p));
  nameEl.textContent = _profile.name || _profile.username;

  const userEl = document.getElementById('profileUsername');
  userEl.classList.remove('skel');
  ['width','height','border-radius'].forEach(p => userEl.style.removeProperty(p));
  userEl.textContent = `@${_profile.username}`;

  const bioText = document.getElementById('bioText');
  bioText.classList.remove('skel');
  ['width','height','border-radius'].forEach(p => bioText.style.removeProperty(p));
  if (_profile.bio) {
    bioText.textContent = _profile.bio;
    bioText.style.color = 'var(--text-2)'; bioText.style.fontStyle = 'normal';
  } else {
    bioText.textContent = 'Add a bio...';
    bioText.style.color = 'var(--text-3)'; bioText.style.fontStyle = 'italic';
  }

  const countryEl = document.getElementById('profileCountry');
  countryEl.classList.remove('skel');
  ['width','height','border-radius'].forEach(p => countryEl.style.removeProperty(p));
  if (_profile.country) {
    const flag = (typeof countryFlag === 'function') ? countryFlag(_profile.country) : '';
    countryEl.textContent = flag + _profile.country;
    countryEl.style.color = 'var(--text-2)'; countryEl.style.fontStyle = 'normal';
    countryEl.dataset.raw = _profile.country;
  } else {
    countryEl.textContent = 'No country set';
    countryEl.style.color = 'var(--text-3)'; countryEl.style.fontStyle = 'italic';
  }

  document.getElementById('epAcctUsername').textContent = '@' + _profile.username;

  document.getElementById('profileWinsChip').textContent = `🏆 ${_profile.debatesWon || 0} won`;
  if (_profile.judgeMode) {
    document.getElementById('profileJudgeBadge').style.display = 'inline-flex';
    // Judges permanently commit their centrist position - no more retakes
    const compassLink = document.getElementById('compassUpdateLink');
    compassLink.removeAttribute('href');
    compassLink.style.opacity = '0.6';
    compassLink.style.cursor = 'default';
    compassLink.addEventListener('click', e => e.preventDefault());
    document.getElementById('compassUpdateLabel').textContent = 'Locked (Judge Mode)';
  }
});

// -- Bio edit -----------------------------------------------------
function startBioEdit() {
  document.getElementById('bioDisplay').style.display = 'none';
  document.getElementById('bioEdit').style.display = 'block';
  const input = document.getElementById('bioInput');
  input.value = (_profile && _profile.bio) || '';
  document.getElementById('bioEditCount').textContent = input.value.length;
  input.focus();
}
function cancelBioEdit() {
  document.getElementById('bioDisplay').style.display = 'block';
  document.getElementById('bioEdit').style.display = 'none';
}
document.addEventListener('input', e => {
  if (e.target.id === 'bioInput') document.getElementById('bioEditCount').textContent = e.target.value.length;
});
async function saveBio() {
  const bioInput = document.getElementById('bioInput');
  const saveBtn  = document.getElementById('saveBioBtn');
  const bioText  = document.getElementById('bioText');
  const user     = firebase.auth().currentUser;
  if (!bioInput || !user) return;
  const newBio = bioInput.value.trim().slice(0, 280);
  saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
  try {
    const token = await user.getIdToken();
    const r = await fetch('/api/profile/bio', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ bio: newBio }) });
    if (!r.ok) throw new Error('Failed');
    _profile.bio = newBio;
    if (newBio) { bioText.textContent = newBio; bioText.style.color = 'var(--text-2)'; bioText.style.fontStyle = 'normal'; }
    else        { bioText.textContent = 'Add a bio...'; bioText.style.color = 'var(--text-3)'; bioText.style.fontStyle = 'italic'; }
    cancelBioEdit();
    showToast('Bio updated!', 'success');
  } catch { showToast('Could not save bio. Try again.', 'error'); }
  finally { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
}

// -- Name edit ------------------------------------------------------
function startNameEdit() {
  document.getElementById('nameDisplayRow').style.display = 'none';
  document.getElementById('nameEditRow').style.display = 'block';
  const input = document.getElementById('nameInput');

  input.focus();
}
function cancelNameEdit() {
  document.getElementById('nameDisplayRow').style.display = 'flex';
  document.getElementById('nameEditRow').style.display = 'none';
}
async function saveName() {
  const input = document.getElementById('nameInput');

  if (!input || !user) return;

// -- Username edit ----------------------------------------------
function startUsernameEdit() {
  document.getElementById('usernameDisplayRow').style.display = 'none';
  document.getElementById('usernameEditRow').style.display = 'block';
  const input = document.getElementById('usernameInput');
  input.value = (_profile && _profile.username) || '';
  input.focus();
  const user = firebase.auth().currentUser;
  const isPasswordAccount = user && user.email && user.email.endsWith('@argueout.app');
  document.getElementById('usernamePasswordRow').style.display = isPasswordAccount ? 'block' : 'none';
}
function cancelUsernameEdit() {
  document.getElementById('usernameDisplayRow').style.display = 'flex';
  document.getElementById('usernameEditRow').style.display = 'none';
  document.getElementById('usernamePasswordInput').value = '';
}
async function saveUsername() {
  const input = document.getElementById('usernameInput');
  const btn   = document.getElementById('saveUsernameBtn');
  const user  = firebase.auth().currentUser;
  if (!input || !user) return;
  const newUsername = input.value.trim();
  const oldUsername = (_profile && _profile.username) || '';
  if (!newUsername) { showToast('Username cannot be empty.', 'error'); return; }
  if (!/^[a-zA-Z0-9_]{3,20}$/.test(newUsername)) { showToast('Username: 3-20 chars, letters/numbers/underscore only.', 'error'); return; }
  if (newUsername === oldUsername) { cancelUsernameEdit(); return; }

  const isPasswordAccount = user.email && user.email.endsWith('@argueout.app');
  if (isPasswordAccount) {
    const pwInput = document.getElementById('usernamePasswordInput');
    const pw = pwInput ? pwInput.value : '';
    if (!pw) { showToast('Enter your current password to confirm.', 'error'); pwInput && pwInput.focus(); return; }
    try {
      const credential = firebase.auth.EmailAuthProvider.credential(user.email, pw);
      await user.reauthenticateWithCredential(credential);
    } catch {
      showToast('Incorrect password.', 'error');
      pwInput.value = ''; pwInput.focus();
      return;
    }
  }

  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const token = await user.getIdToken();
    const r = await fetch('/api/profile/username', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ username: newUsername, oldUsername }) });
    if (r.status === 409) { showToast('Username already taken. Try another.', 'error'); return; }
    if (!r.ok) throw new Error('Failed');
    _profile.username = newUsername;
    localStorage.setItem('username', newUsername);
    document.getElementById('profileUsername').textContent = `@${newUsername}`;
    document.getElementById('epAcctUsername').textContent = `@${newUsername}`;
    cancelUsernameEdit();
    showToast('Username updated!', 'success');
  } catch { showToast('Could not update username. Try again.', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Save'; }
}

// -- Country edit -------------------------------------------------
function startCountryEdit() {
  document.getElementById('countryDisplayRow').style.display = 'none';
  document.getElementById('countryEditRow').style.display = 'block';
  const current = document.getElementById('profileCountry');
  if (typeof setCountryPickerValue === 'function') {
    setCountryPickerValue('sidebarCountrySearch', 'sidebarCountry', current.dataset.raw || '');
  }
  setTimeout(() => document.getElementById('sidebarCountrySearch')?.focus(), 50);
}
function cancelCountryEdit() {
  document.getElementById('countryDisplayRow').style.display = 'flex';
  document.getElementById('countryEditRow').style.display = 'none';
}
async function saveCountry() {
  const btn  = document.getElementById('saveCountryBtn');
  const val  = (document.getElementById('sidebarCountry') || {}).value || '';
  const user = firebase.auth().currentUser;
  if (!user) return;
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const token = await user.getIdToken();
    const r = await fetch('/api/profile/country', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ country: val }) });
    if (!r.ok) throw new Error('Failed');
    _profile.country = val;
    const el = document.getElementById('profileCountry');
    if (val) {
      const flag = (typeof countryFlag === 'function') ? countryFlag(val) : '';
      el.textContent = flag + val; el.style.color = 'var(--text-2)'; el.style.fontStyle = 'normal'; el.dataset.raw = val;
    } else {
      el.textContent = 'No country set'; el.style.color = 'var(--text-3)'; el.style.fontStyle = 'italic'; el.dataset.raw = '';
    }
    cancelCountryEdit();
    showToast('Country updated.', 'success');
  } catch { showToast('Could not update country. Try again.', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Save'; }
}

// -- Avatar change --------------------------------------------------
document.getElementById('profilePicWrap')?.addEventListener('mouseenter', () => { document.getElementById('avatarHover').style.opacity = '1'; });
document.getElementById('profilePicWrap')?.addEventListener('mouseleave', () => { document.getElementById('avatarHover').style.opacity = '0'; });

document.getElementById('profilePicInput')?.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { showToast('Image must be under 10 MB.', 'error'); return; }
  const user    = firebase.auth().currentUser;
  const initial = ((_profile && _profile.username) || 'U')[0].toUpperCase();
  const reader  = new FileReader();
  reader.onload = async ev => {
    applyAvatar(ev.target.result, initial);
    try {
      const compressed = await compressAvatar(ev.target.result);
      const token = await user.getIdToken();
      const r = await fetch('/api/profile/avatar', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ avatarUrl: compressed }) });
      if (!r.ok) throw new Error('Failed');
      _profile.avatarUrl = compressed;
      localStorage.setItem('avatarDataUrl', compressed);
      applyAvatar(compressed, initial);
      showToast('Profile picture updated!', 'success');
    } catch { showToast('Could not save picture. Try again.', 'error'); }
  };
  reader.readAsDataURL(file);
});
</script>
