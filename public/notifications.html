<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — ArgueOut</title>
  <script>(function(){var t=localStorage.getItem('ao-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');document.documentElement.style.background=(t==='light'||(t!=='dark'&&window.matchMedia('(prefers-color-scheme: light)').matches))?'#e5e5f2':'#05050f';if(typeof window.AndroidAuth!=='undefined'||window.matchMedia('(max-width:1024px)').matches)document.write('<style>@view-transition{navigation:none}</style>');}());</script>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script src="/js/page-transitions.js" defer></script>
  <script src="/js/instant-nav.js" defer></script>
  <script src="/js/cookie-consent.js" defer></script>
  <style>
    body { background: var(--bg-0); min-height: 100dvh; }
    .notif-page { max-width: 540px; margin: 0 auto; padding: 0; min-height: 100dvh; display: flex; flex-direction: column; }
    .notif-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--navbar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }
    .notif-back {
      width: 40px; height: 40px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-1); text-decoration: none; font-size: 1.2rem;
      flex-shrink: 0;
    }
    .notif-topbar-title { font-size: 1.05rem; font-weight: 700; color: var(--text-1); flex: 1; }
    .notif-clear-all {
      font-size: 0.8rem; color: var(--text-3); background: none;
      border: none; cursor: pointer; padding: 6px 10px; border-radius: 8px;
    }
    .notif-list-page { flex: 1; }
    .notif-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .notif-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--purple); flex-shrink: 0; margin-top: 5px;
    }
    .notif-dot.read { background: var(--border); }
    .notif-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      flex-shrink: 0; object-fit: cover;
      background: var(--bg-card); border: 1px solid var(--border);
    }
    .notif-msg { font-size: 0.9rem; color: var(--text-1); line-height: 1.5; flex: 1; }
    .notif-time { font-size: 0.75rem; color: var(--text-3); margin-top: 3px; }
    .notif-actions { display: flex; gap: 8px; margin-top: 10px; }
    .notif-empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 60px 24px; color: var(--text-3);
    }
    .notif-empty-icon { font-size: 3rem; }
    .notif-empty-title { font-size: 1rem; font-weight: 700; color: var(--text-2); }
    #loadingState { padding: 40px; text-align: center; color: var(--text-3); }
  </style>
</head>
<body>
<div class="notif-page">
  <div class="notif-topbar">
    <a href="/lobby" class="notif-back">←</a>
    <span class="notif-topbar-title">Notifications</span>
    <button class="notif-clear-all" id="clearAllBtn" style="display:none">Clear all</button>
  </div>

  <div id="loadingState">
    <div class="notif-item"><div class="skel notif-dot" style="margin-top:5px"></div><div class="skel" style="flex:1;height:14px;border-radius:6px;width:80%"></div></div>
    <div class="notif-item"><div class="skel notif-dot" style="margin-top:5px"></div><div class="skel" style="flex:1;height:14px;border-radius:6px;width:60%"></div></div>
    <div class="notif-item"><div class="skel notif-dot" style="margin-top:5px"></div><div class="skel" style="flex:1;height:14px;border-radius:6px;width:40%"></div></div>
  </div>
  <div class="notif-list-page" id="notifListPage" style="display:none"></div>
  <div class="notif-empty-state" id="emptyState" style="display:none">
    <div class="notif-empty-icon"><svg style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
    <div class="notif-empty-title">All clear</div>
    <div>You have no notifications yet</div>
  </div>
</div>

<!-- Challenge accepted: Join button instead of auto-redirecting -->
<div class="challenge-notif" id="challengeAcceptedPanel">
  <div style="display:flex;align-items:flex-start;gap:12px">
    <div style="flex-shrink:0;color:var(--green)"><svg style="width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
    <div style="flex:1">
      <div id="challengeAcceptedText" style="font-size:0.9rem;font-weight:600;margin-bottom:10px">Someone accepted your challenge!</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="joinAcceptedChallengeDebate()">Join Debate</button>
        <button class="btn btn-ghost btn-sm" onclick="dismissChallengeAcceptedNotif()">Dismiss</button>
      </div>
    </div>
    <button onclick="dismissChallengeAcceptedNotif()" style="background:none;border:none;cursor:pointer;color:var(--text-3);padding:2px;display:flex;align-items:center;flex-shrink:0">
      <svg style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script src="/js/firebase-init.js"></script>
<script src="/js/push-notifications.js"></script>
<script>
function showToast(msg, type) {
  var c = document.getElementById('toast-container');
  if (!c) return;
  var t = document.createElement('div');
  t.className = 'toast toast-' + (type || 'info');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function () { t.classList.add('show'); }, 10);
  setTimeout(function () { t.classList.remove('show'); setTimeout(function () { t.remove(); }, 300); }, 3500);
}

// -- Socket.io: only needed to act on challenge notifications -----------
var socket = io({ autoConnect: false });
var socketReady = false;

socket.on('connect', function () {
  var user = firebase.auth().currentUser;
  if (user) user.getIdToken().then(function (token) { socket.emit('authenticate', { idToken: token }); });
});
socket.on('authenticated', function () { socketReady = true; });

// Same reasoning as lobby.js/divide.js: don't auto-redirect into the debate,
// just surface a Join button so accepting doesn't yank whoever's looking at
// their notifications into a debate with no way to opt out.
var pendingChallengeAcceptedRoom = null;
var pendingChallengeAcceptedOpponent = null;

function joinAcceptedChallengeDebate() {
  if (!pendingChallengeAcceptedRoom) return;
  localStorage.setItem('debateRoomId', pendingChallengeAcceptedRoom);
  localStorage.setItem('debateOpponent', JSON.stringify(pendingChallengeAcceptedOpponent || {}));
  window.location.href = '/debate?room=' + encodeURIComponent(pendingChallengeAcceptedRoom);
}

function dismissChallengeAcceptedNotif() {
  var panel = document.getElementById('challengeAcceptedPanel');
  if (panel) panel.classList.remove('active');
  pendingChallengeAcceptedRoom = null;
  pendingChallengeAcceptedOpponent = null;
}

socket.on('challenge-accepted', function (data) {
  pendingChallengeAcceptedRoom = data.roomId;
  pendingChallengeAcceptedOpponent = data.opponent;
  if (data.question) localStorage.setItem('debateQuestion', data.question);
  else localStorage.removeItem('debateQuestion');
  var textEl = document.getElementById('challengeAcceptedText');
  if (textEl && data.opponent) textEl.textContent = data.opponent.username + ' accepted your challenge!';
  var panel = document.getElementById('challengeAcceptedPanel');
  if (panel) panel.classList.add('active');
});

socket.on('challenge-error', function (data) {
  showToast(data.error || 'Something went wrong.', 'error');
  loadNotifs();
});

// -- Judge Mode: accept/decline requests, and follow the judge into the debate --
function acceptJudgeRequest(notifId, roomId, row) {
  if (!socketReady) { showToast('Still connecting — try again in a moment.', 'info'); return; }
  row.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
  socket.emit('accept-judge-request', { roomId: roomId, notifId: notifId });
}

function declineJudgeRequest(notifId, row) {
  if (!socketReady) { showToast('Still connecting — try again in a moment.', 'info'); return; }
  row.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
  socket.emit('decline-judge-request', { notifId: notifId });
  showToast('Judge request declined.', 'info');
  setTimeout(loadNotifs, 400);
}

socket.on('judge-request-accepted', function (data) {
  window.location.href = '/spectate?room=' + encodeURIComponent(data.roomId);
});

socket.on('judge-request-error', function (data) {
  showToast(data.error || 'Something went wrong.', 'error');
  loadNotifs();
});

function acceptChallenge(notifId, fromUserId, question, row) {
  if (!socketReady) { showToast('Still connecting — try again in a moment.', 'info'); return; }
  row.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
  socket.emit('accept-challenge-by-user', { challengerUserId: fromUserId, question: question || null, notifId: notifId });
}

function declineChallenge(notifId, fromUserId, row) {
  if (!socketReady) { showToast('Still connecting — try again in a moment.', 'info'); return; }
  row.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
  socket.emit('reject-challenge-by-user', { challengerUserId: fromUserId, notifId: notifId });
  showToast('Challenge declined.', 'info');
  setTimeout(loadNotifs, 400);
}

var VERDICT_ICONS = {
  won: '<svg style="width:100%;height:100%;color:var(--amber)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v5a5 5 0 0 1-10 0z"/><path d="M7 5H4a2 2 0 0 0 2 3.5"/><path d="M17 5h3a2 2 0 0 1-2 3.5"/></svg>',
  lost: '<svg style="width:100%;height:100%;color:var(--red)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
  draw: '<svg style="width:100%;height:100%;color:var(--text-3)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>',
  expired: '<svg style="width:100%;height:100%;color:var(--text-3)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 7 12 12 15 15"/></svg>'
};

function renderNotifs(items) {
  var loadEl = document.getElementById('loadingState');
  var list = document.getElementById('notifListPage');
  var empty = document.getElementById('emptyState');
  var clearBtn = document.getElementById('clearAllBtn');
  loadEl.style.display = 'none';
  if (!items.length) {
    list.style.display = 'none';
    empty.style.display = 'flex';
    clearBtn.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  list.style.display = 'block';
  clearBtn.style.display = 'inline-block';
  list.innerHTML = '';
  items.forEach(function (d) {
    var timeStr = d.createdAt ? new Date(d.createdAt).toLocaleDateString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    var dot = document.createElement('div');
    dot.className = 'notif-dot' + (d.read ? ' read' : '');
    var msg = document.createElement('div');
    msg.className = 'notif-msg';
    if (d.type === 'judge-verdict' && VERDICT_ICONS[d.verdict]) {
      msg.style.display = 'flex';
      msg.style.alignItems = 'flex-start';
      msg.style.gap = '6px';
      var verdictIcon = document.createElement('span');
      verdictIcon.style.cssText = 'width:15px;height:15px;flex-shrink:0;margin-top:2px';
      verdictIcon.innerHTML = VERDICT_ICONS[d.verdict];
      var verdictText = document.createElement('span');
      verdictText.textContent = d.message || 'New notification';
      msg.appendChild(verdictIcon);
      msg.appendChild(verdictText);
    } else {
      msg.textContent = d.message || 'New notification';
    }
    var body = document.createElement('div');
    body.style.flex = '1';
    body.appendChild(msg);
    if (timeStr) {
      var t = document.createElement('div');
      t.className = 'notif-time';
      t.textContent = timeStr;
      body.appendChild(t);
    }
    var row = document.createElement('div');
    row.className = 'notif-item';
    if (d.type === 'challenge' && d.fromUserId && !d.read) {
      var actions = document.createElement('div');
      actions.className = 'notif-actions';
      var acceptBtn = document.createElement('button');
      acceptBtn.className = 'btn btn-primary btn-sm';
      acceptBtn.textContent = 'Accept';
      acceptBtn.onclick = function () { acceptChallenge(d.id, d.fromUserId, d.question, row); };
      var declineBtn = document.createElement('button');
      declineBtn.className = 'btn btn-ghost btn-sm';
      declineBtn.textContent = 'Decline';
      declineBtn.onclick = function () { declineChallenge(d.id, d.fromUserId, row); };
      actions.appendChild(acceptBtn);
      actions.appendChild(declineBtn);
      body.appendChild(actions);
    }
    if (d.type === 'judge-request' && d.roomId && !d.read) {
      (function (notifId, roomId) {
        var actions = document.createElement('div');
        actions.className = 'notif-actions';
        var acceptBtn = document.createElement('button');
        acceptBtn.className = 'btn btn-primary btn-sm';
        acceptBtn.textContent = 'Accept & Watch';
        acceptBtn.onclick = function () { acceptJudgeRequest(notifId, roomId, row); };
        var declineBtn = document.createElement('button');
        declineBtn.className = 'btn btn-ghost btn-sm';
        declineBtn.textContent = 'Decline';
        declineBtn.onclick = function () { declineJudgeRequest(notifId, row); };
        actions.appendChild(acceptBtn);
        actions.appendChild(declineBtn);
        body.appendChild(actions);
      })(d.id, d.roomId);
    }
    // Whoever's responsible for this notification (challenger, judge
    // requester, judge delivering a verdict) gets their pfp shown - never for
    // admin broadcasts, which have no single person behind them anyway.
    if (d.fromUserId && d.type !== 'admin') {
      var avatar = document.createElement('img');
      avatar.className = 'notif-avatar';
      avatar.alt = '';
      avatar.src = '/api/avatar/' + encodeURIComponent(d.fromUserId);
      avatar.onerror = function () { this.remove(); };
      row.appendChild(avatar);
    }
    row.appendChild(dot);
    row.appendChild(body);
    list.appendChild(row);
  });
}

function notifSkeletonHtml() {
  return [80, 60, 40].map(function (w) {
    return '<div class="notif-item"><div class="skel notif-dot" style="margin-top:5px"></div>' +
           '<div class="skel" style="flex:1;height:14px;border-radius:6px;width:' + w + '%"></div></div>';
  }).join('');
}

function loadNotifs() {
  var user = firebase.auth().currentUser;
  if (!user) return;
  var loadEl = document.getElementById('loadingState');
  loadEl.style.display = 'block';
  loadEl.innerHTML = notifSkeletonHtml();
  document.getElementById('notifListPage').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  user.getIdToken().then(function (token) {
    return fetch('/api/notifications', { headers: { 'Authorization': 'Bearer ' + token } });
  }).then(function (r) {
    if (!r.ok) throw new Error('Failed');
    return r.json();
  }).then(function (data) {
    renderNotifs(data.items || []);
  }).catch(function () {
    loadEl.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px;text-align:center;color:var(--text-3)">' +
      '<div>Could not load notifications.</div>' +
      '<button onclick="loadNotifs()" style="padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-1);cursor:pointer;font-size:0.85rem">Try again</button>' +
      '</div>';
  });
}

firebase.auth().onAuthStateChanged(function (user) {
  if (!user) { window.location.href = '/login'; return; }
  loadNotifs();
  if (!socket.connected) socket.connect();
  document.getElementById('clearAllBtn').onclick = function () {
    user.getIdToken().then(function (token) {
      return fetch('/api/notifications/clear', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
    }).then(loadNotifs);
  };
});
</script>
</body>
</html>
