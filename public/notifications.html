<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — ArgueOut</title>
  <script>(function(){var t=localStorage.getItem('ao-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');document.documentElement.style.background=(t==='light'||(t!=='dark'&&window.matchMedia('(prefers-color-scheme: light)').matches))?'#e5e5f2':'#05050f';if(typeof window.AndroidAuth!=='undefined'||window.matchMedia('(max-width:1024px)').matches)document.write('<style>@view-transition{navigation:none}</style>');}());</script>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script src="/js/page-transitions.js" defer></script>
  <style>
    body { background: var(--bg-0); min-height: 100dvh; }
    .notif-page { max-width: 540px; margin: 0 auto; padding: 0; min-height: 100dvh; display: flex; flex-direction: column; }
    .notif-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--navbar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }
    .notif-back {
      width: 40px; height: 40px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-1); text-decoration: none; font-size: 1.2rem;
      flex-shrink: 0;
    }
    .notif-topbar-title { font-size: 1.05rem; font-weight: 700; color: var(--text-1); flex: 1; }
    .notif-clear-all {
      font-size: 0.8rem; color: var(--text-3); background: none;
      border: none; cursor: pointer; padding: 6px 10px; border-radius: 8px;
    }
    .notif-list-page { flex: 1; }
    .notif-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .notif-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--purple); flex-shrink: 0; margin-top: 5px;
    }
    .notif-dot.read { background: var(--border); }
    .notif-msg { font-size: 0.9rem; color: var(--text-1); line-height: 1.5; flex: 1; }
    .notif-time { font-size: 0.75rem; color: var(--text-3); margin-top: 3px; }
    .notif-actions { display: flex; gap: 8px; margin-top: 10px; }
    .notif-empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 60px 24px; color: var(--text-3);
    }
    .notif-empty-icon { font-size: 3rem; }
    .notif-empty-title { font-size: 1rem; font-weight: 700; color: var(--text-2); }
    #loadingState { padding: 40px; text-align: center; color: var(--text-3); }
  </style>
</head>
<body>
<div class="notif-page">
  <div class="notif-topbar">
    <a href="/lobby" class="notif-back">←</a>
    <span class="notif-topbar-title">Notifications</span>
    <button class="notif-clear-all" id="clearAllBtn" style="display:none">Clear all</button>
  </div>

  <div id="loadingState" style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px;text-align:center;color:var(--text-3)"><div>Loading…</div></div>
  <div class="notif-list-page" id="notifListPage" style="display:none"></div>
  <div class="notif-empty-state" id="emptyState" style="display:none">
    <div class="notif-empty-icon"><svg style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
    <div class="notif-empty-title">All clear</div>
    <div>You have no notifications yet</div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-init.js"></script>
<script>
function showToast(msg, type) {
  var c = document.getElementById('toast-container');
  if (!c) return;
  var t = document.createElement('div');
  t.className = 'toast toast-' + (type || 'info');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function () { t.classList.add('show'); }, 10);
  setTimeout(function () { t.classList.remove('show'); setTimeout(function () { t.remove(); }, 300); }, 3500);
}

// -- Socket.io: only needed to act on challenge notifications -----------
var socket = io({ autoConnect: false });
var socketReady = false;

socket.on('connect', function () {
  var user = firebase.auth().currentUser;
  if (user) user.getIdToken().then(function (token) { socket.emit('authenticate', { idToken: token }); });
});
socket.on('authenticated', function () { socketReady = true; });

socket.on('challenge-accepted', function (data) {
  showToast('Challenge accepted! Starting debate…', 'success');
  localStorage.setItem('debateRoomId', data.roomId);
  localStorage.setItem('debateOpponent', JSON.stringify(data.opponent));
  if (data.question) localStorage.setItem('debateQuestion', data.question);
  else localStorage.removeItem('debateQuestion');
  setTimeout(function () { window.location.href = '/debate?room=' + encodeURIComponent(data.roomId); }, 500);
});

socket.on('challenge-error', function (data) {
  showToast(data.error || 'Something went wrong.', 'error');
  loadNotifs();
});

function acceptChallenge(notifId, fromUserId, question, row) {
  if (!socketReady) { showToast('Still connecting — try again in a moment.', 'info'); return; }
  row.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
  socket.emit('accept-challenge-by-user', { challengerUserId: fromUserId, question: question || null, notifId: notifId });
}

function declineChallenge(notifId, fromUserId, row) {
  if (!socketReady) { showToast('Still connecting — try again in a moment.', 'info'); return; }
  row.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
  socket.emit('reject-challenge-by-user', { challengerUserId: fromUserId, notifId: notifId });
  showToast('Challenge declined.', 'info');
  setTimeout(loadNotifs, 400);
}

function renderNotifs(items) {
  var loadEl = document.getElementById('loadingState');
  var list = document.getElementById('notifListPage');
  var empty = document.getElementById('emptyState');
  var clearBtn = document.getElementById('clearAllBtn');
  loadEl.style.display = 'none';
  if (!items.length) {
    list.style.display = 'none';
    empty.style.display = 'flex';
    clearBtn.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  list.style.display = 'block';
  clearBtn.style.display = 'inline-block';
  list.innerHTML = '';
  items.forEach(function (d) {
    var timeStr = d.createdAt ? new Date(d.createdAt).toLocaleDateString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    var dot = document.createElement('div');
    dot.className = 'notif-dot' + (d.read ? ' read' : '');
    var msg = document.createElement('div');
    msg.className = 'notif-msg';
    msg.textContent = d.message || 'New notification';
    var body = document.createElement('div');
    body.style.flex = '1';
    body.appendChild(msg);
    if (timeStr) {
      var t = document.createElement('div');
      t.className = 'notif-time';
      t.textContent = timeStr;
      body.appendChild(t);
    }
    var row = document.createElement('div');
    row.className = 'notif-item';
    if (d.type === 'challenge' && d.fromUserId && !d.read) {
      var actions = document.createElement('div');
      actions.className = 'notif-actions';
      var acceptBtn = document.createElement('button');
      acceptBtn.className = 'btn btn-primary btn-sm';
      acceptBtn.textContent = 'Accept';
      acceptBtn.onclick = function () { acceptChallenge(d.id, d.fromUserId, d.question, row); };
      var declineBtn = document.createElement('button');
      declineBtn.className = 'btn btn-ghost btn-sm';
      declineBtn.textContent = 'Decline';
      declineBtn.onclick = function () { declineChallenge(d.id, d.fromUserId, row); };
      actions.appendChild(acceptBtn);
      actions.appendChild(declineBtn);
      body.appendChild(actions);
    }
    row.appendChild(dot);
    row.appendChild(body);
    list.appendChild(row);
  });
}

function loadNotifs() {
  var user = firebase.auth().currentUser;
  if (!user) return;
  var loadEl = document.getElementById('loadingState');
  loadEl.style.display = 'flex';
  loadEl.innerHTML = '<div>Loading…</div>';
  document.getElementById('notifListPage').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  user.getIdToken().then(function (token) {
    return fetch('/api/notifications', { headers: { 'Authorization': 'Bearer ' + token } });
  }).then(function (r) {
    if (!r.ok) throw new Error('Failed');
    return r.json();
  }).then(function (data) {
    renderNotifs(data.items || []);
  }).catch(function () {
    loadEl.innerHTML =
      '<div>Could not load notifications.</div>' +
      '<button onclick="loadNotifs()" style="margin-top:8px;padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-1);cursor:pointer;font-size:0.85rem">Try again</button>';
  });
}

firebase.auth().onAuthStateChanged(function (user) {
  if (!user) { window.location.href = '/login'; return; }
  loadNotifs();
  if (!socket.connected) socket.connect();
  document.getElementById('clearAllBtn').onclick = function () {
    user.getIdToken().then(function (token) {
      return fetch('/api/notifications/clear', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
    }).then(loadNotifs);
  };
});
</script>
<script src="/js/debug-overlay.js"></script>
</body>
</html>
