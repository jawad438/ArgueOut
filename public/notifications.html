<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — ArgueOut</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script>(function(){var t=localStorage.getItem('ao-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');}());</script>
  <style>
    body { background: var(--bg-0); min-height: 100dvh; }
    .notif-page { max-width: 540px; margin: 0 auto; padding: 0; min-height: 100dvh; display: flex; flex-direction: column; }
    .notif-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(5,5,15,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }
    .notif-back {
      width: 40px; height: 40px; border-radius: 10px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-1); text-decoration: none; font-size: 1.2rem;
      flex-shrink: 0;
    }
    .notif-topbar-title { font-size: 1.05rem; font-weight: 700; color: var(--text-1); flex: 1; }
    .notif-clear-all {
      font-size: 0.8rem; color: var(--text-3); background: none;
      border: none; cursor: pointer; padding: 6px 10px; border-radius: 8px;
    }
    .notif-list-page { flex: 1; }
    .notif-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .notif-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--purple); flex-shrink: 0; margin-top: 5px;
    }
    .notif-dot.read { background: var(--border); }
    .notif-msg { font-size: 0.9rem; color: var(--text-1); line-height: 1.5; flex: 1; }
    .notif-time { font-size: 0.75rem; color: var(--text-3); margin-top: 3px; }
    .notif-empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 60px 24px; color: var(--text-3);
    }
    .notif-empty-icon { font-size: 3rem; }
    .notif-empty-title { font-size: 1rem; font-weight: 700; color: var(--text-2); }
    #loadingState { padding: 40px; text-align: center; color: var(--text-3); }
  </style>
</head>
<body>
<div class="notif-page">
  <div class="notif-topbar">
    <a href="/lobby" class="notif-back">←</a>
    <span class="notif-topbar-title">Notifications</span>
    <button class="notif-clear-all" id="clearAllBtn" style="display:none">Clear all</button>
  </div>

  <div id="loadingState" style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px;text-align:center;color:var(--text-3)"><div>Loading…</div></div>
  <div class="notif-list-page" id="notifListPage" style="display:none"></div>
  <div class="notif-empty-state" id="emptyState" style="display:none">
    <div class="notif-empty-icon">🔔</div>
    <div class="notif-empty-title">All clear</div>
    <div>You have no notifications yet</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-init.js"></script>
<script>
var _uid = null;
var _db = null;

function renderNotifs(snap) {
  var loadEl = document.getElementById('loadingState');
  var list = document.getElementById('notifListPage');
  var empty = document.getElementById('emptyState');
  var clearBtn = document.getElementById('clearAllBtn');
  loadEl.style.display = 'none';
  if (snap.empty) {
    list.style.display = 'none';
    empty.style.display = 'flex';
    clearBtn.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  list.style.display = 'block';
  clearBtn.style.display = 'inline-block';
  list.innerHTML = '';
  snap.forEach(function (doc) {
    var d = doc.data();
    var time = d.createdAt ? d.createdAt.toDate() : null;
    var timeStr = time ? time.toLocaleDateString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    var dot = document.createElement('div');
    dot.className = 'notif-dot' + (d.read ? ' read' : '');
    var msg = document.createElement('div');
    msg.className = 'notif-msg';
    msg.textContent = d.message || d.text || 'New notification';
    var body = document.createElement('div');
    body.appendChild(msg);
    if (timeStr) {
      var t = document.createElement('div');
      t.className = 'notif-time';
      t.textContent = timeStr;
      body.appendChild(t);
    }
    var row = document.createElement('div');
    row.className = 'notif-item';
    row.appendChild(dot);
    row.appendChild(body);
    list.appendChild(row);
  });
}

function loadNotifs() {
  if (!_uid || !_db) return;
  var loadEl = document.getElementById('loadingState');
  loadEl.style.display = 'flex';
  loadEl.innerHTML = '<div>Loading…</div>';
  document.getElementById('notifListPage').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  _db.collection('notifications').doc(_uid).collection('items')
    .orderBy('createdAt', 'desc').limit(50).get()
    .then(renderNotifs)
    .catch(function () {
      loadEl.innerHTML =
        '<div>Could not load notifications.</div>' +
        '<button onclick="loadNotifs()" style="margin-top:8px;padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text-1);cursor:pointer;font-size:0.85rem">Try again</button>';
    });
}

firebase.auth().onAuthStateChanged(function (user) {
  if (!user) { window.location.href = '/login'; return; }
  _uid = user.uid;
  _db = firebase.firestore();
  loadNotifs();
  document.getElementById('clearAllBtn').onclick = function () {
    _db.collection('notifications').doc(_uid).collection('items').get().then(function (snap) {
      var batch = _db.batch();
      snap.forEach(function (d) { batch.delete(d.ref); });
      return batch.commit();
    }).then(loadNotifs);
  };
});
</script>
</body>
</html>
